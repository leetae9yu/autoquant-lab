data:
  start_date: "1990-01-01"
  end_date: "2026-05-04"
  data_dir: "data"

panel:
  frequency: "monthly"
  universe:
    share_codes: [10, 11]
    exchange_codes: [1, 2, 3]
    min_market_cap: 50000000
    exclude_financials: false
  forward_horizons: [1, 3, 6]

features:
  families:
    compustat: true
    crsp: true
    ibes: true
    macro: true
  pit_availability:
    compustat_lag_days: 90
    ibes_lag_days: 1
    macro_release_lag_days: 1
    forbid_future_leakage: true

model:
  name: "lightgbm"
  target_column: "factor_long_short_ret_1m"
  hyperparameters:
    objective: "regression"
    n_estimators: 300
    learning_rate: 0.03
    num_leaves: 31
    subsample: 0.9
    colsample_bytree: 0.9
    random_state: 42
    n_jobs: -1
    verbosity: -1

models:
  ridge:
    params:
      alpha: 1.0
  lightgbm:
    params:
      objective: "regression"
      n_estimators: 300
      learning_rate: 0.03
      num_leaves: 31
      subsample: 0.9
      colsample_bytree: 0.9
      random_state: 42
      n_jobs: -1
      verbosity: -1

ddqm2:
  return_column: "ret_1m_fwd"
  quantile: 0.2
  validation_fraction: 0.15
  holdout_fraction: 0.15
  min_observations: 24
  min_weight: 0.0
  factor_universe: "all_implemented_current"
  factor_universe_target_count: 13
  factor_universe_overrides: []
  macro_feature_design: "current_macro_family"
  portfolio_surface: "weighted_factor_return_current"
  evaluation_mode: "walk_forward"
  walk_forward_test_periods: 12
  walk_forward_validation_periods: 12
  max_factor_score_rows: 30000000
  factor_score_chunk_dates: 12
  output_dir: "experiments/ddqm2"

budget:
  max_trials: 240
  max_runtime_minutes: 2880
  retry_limit: 2

report:
  output_formats: ["markdown", "json", "parquet"]

artifacts:
  output_dir: "experiments/ddqm2"
  retention_policy:
    keep_last: 50
    max_age_days: 365
